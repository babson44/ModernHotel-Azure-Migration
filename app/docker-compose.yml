services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: hotel-sql
    environment:
      SA_PASSWORD: "Hotel@2025!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Hotel@2025!" -Q "SELECT 1" -C
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: src/ModernHotel.API/Dockerfile
    container_name: hotel-api
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__HotelDb=Server=sqlserver,1433;Database=GrandAzureHotel;User Id=sa;Password=Hotel@2025!;TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      sqlserver:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: src/ModernHotel.Web/Dockerfile
    container_name: hotel-web
    ports:
      - "8080:8080"
    environment:
      - ApiBaseUrl=http://api:8080/
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - api

volumes:
  sqldata:
